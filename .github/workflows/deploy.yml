name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
          USER_NAME: ${{ secrets.DROPLET_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key "$USER_NAME@$HOST" 'bash -s' <<'REMOTE'
            set -e
            REPO=https://github.com/AlitoCodeWork/-edu-platform.git
            if [ ! -d /root/edu-platform/.git ]; then
              git clone "$REPO" /root/edu-platform
            fi
            cd /root/edu-platform
            git fetch origin main
            git reset --hard origin/main
            if [ ! -f .env ]; then
              echo "ERROR: /root/edu-platform/.env no existe. Crealo una vez (DATABASE_URL, SERPAPI_KEY, SESSION_SECRET)." >&2
              exit 1
            fi
            echo "==> building edu (ollama paused for RAM)"
            docker stop marketplace-cuba-ollama-1 || true
            docker compose -f docker-compose.edu.yml up -d --build
            docker start marketplace-cuba-ollama-1 || true
            docker compose -f docker-compose.edu.yml ps
            echo "==> deploy done"
          REMOTE
